  <div id="pageContainer">
    <div id="panelContainer">
      <h1>Κανόνες Ονοματολογίας Οργανικών Ενώσεων</h1>
      <div class="HFlex" style="justify-content: center">
        <!-- left column: MENU -->
        <div id="menuCol" class="VFlex" style="margin-right: 10px">
          <button id="menuToggle" onclick="fToggleMenu()">☰ Μενού</button>
          <div id="menuDrawer" class="menu-open">
            <div id="nomeclature2Menu"></div>
          </div>
        </div>

        <!-- middle column -->
        <div id="viewerCol" class="VFlex" style="background-color: #fff">
          <div class="panelTitle">
            <span>Μόριο</span>
            <button id="viewerSettingsBtn" class="settingsBtn" onclick="fToggleViewerSettings()"
              data-tooltip="Ρυθμίσεις">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path
                  d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.02 7.02 0 0 0-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54a7.02 7.02 0 0 0-1.62.94l-2.39-.96a.47.47 0 0 0-.59.22L2.74 8.87a.47.47 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54a7.02 7.02 0 0 0 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 0 1 8.4 12 3.6 3.6 0 0 1 12 8.4a3.6 3.6 0 0 1 3.6 3.6 3.6 3.6 0 0 1-3.6 3.6z" />
              </svg>
            </button>
            <div id="viewerSettingsPanel">
              <div class="settingTitle">Ρυθμίσεις</div>
              <div id="radioChainMode" class="settingRow">
                <div class="settingLabel">Υπολογισμός κύριας αλυσίδας:</div>
                <div class="radioGroupContainer HFlex" style="align-items: center; gap: 0">
                  <div class="radioCheckContainer unselectedRadio">
                    Από δεδομένα<span class="radioCheck"></span>
                  </div>
                  <div class="radioCheckContainer selectedRadio">
                    Αλγοριθμικά<span class="radioCheck"></span>
                  </div>
                </div>
              </div>
              <div id="originalJSME" class="settingRow">
                <div class="settingLabel">Εμφάνιση αρχικού JSME:</div>
                <div id="originalJSMECheck" class="checkBoxContainer unselectedCheck">
                  &nbsp;<span class="checkBox"></span>
                </div>
              </div>
              <!-- <div id="svgAtomColorRow" class="settingRow">
                <div class="settingLabel">Χρωματισμός ατόμων (2D):</div>
                <div id="svgAtomColorCheck" class="checkBoxContainer unselectedCheck">
                  &nbsp;<span class="checkBox"></span>
                </div>
              </div> -->
            </div>
          </div>

          <!--JSME 2D -->
          <div id="jsmeNomeclatureDIV" style="
                border: 1px solid var(--baseColor);
                border-top: 0;
                border-bottom: 0;
              ">
            <div id="jsmeNomeclatureORGNL" class="hide"></div>
            <div id="jsmeNomeclature" class="hide"></div>
            <div id="jsmeNomeclatureSVG"></div>
          </div>
          <div id="radio2DMode" style="
                border: 1px solid var(--baseColor);
                border-top: 1px solid #ddd;
                border-bottom: 1px solid #ddd;
              ">

            <div class="radioGroupContainer HFlex" style="
                  justify-content: space-between;
                  align-items: center;
                  padding: 0 6px;
                ">
              <div id="svgAtomColorCheck" class="checkBoxContainer unselectedCheck">
                Έγχρωμα Σύμβολα<span class="checkBox"></span>
              </div>
              <div class="HFlex" style="align-items: center">
                <div class="radioCheckContainer selectedRadio">
                  Συνεπτυγμένος<span class="radioCheck"></span>
                </div>
                <div class="radioCheckContainer unselectedRadio">
                  Ανεπτυγμένος<span class="radioCheck"></span>
                </div>
                <div class="radioCheckContainer unselectedRadio">
                  Σκελετικός<span class="radioCheck"></span>
                </div>
                <div id="zigzagCheck" class="checkBoxContainer unselectedCheck " style=" margin-left: 10px">
                  Σύμβολα CH<sub>n</sub><span class="checkBox"></span>
                </div>
              </div>
              <div id="save2DBtn" class="saveImgBtn" onclick="fSave2DPng()" data-tooltip="Αποθήκευση εικόνας 2D">
                <img src="imgs/image-svgrepo-Industrial-Sharp.svg" />
              </div>
            </div>
          </div>

          <div id="nomeclature3D" class="JmolContainer" style="
                border: 1px solid var(--baseColor);
                border-top: 0;
                border-bottom: 0;
              ">
            <script>
              jmolAppletNomeclature = Jmol.getApplet(
                "jmolAppletNomeclature",
                JSmol_Applet,
              );
              Jmol.script(jmolAppletNomeclature, "frank off");
            </script>
          </div>
          <div id="controls3D" class="HFlex" style="
                border: 1px solid var(--baseColor);
                border-top: 1px solid #ddd;
                justify-content: space-between;
                align-items: center;
                padding: 0 6px;
              ">
            <div class="HFlex" style="align-items: center">
              <div id="atomSymbolsCheck" class="checkBoxContainer selectedCheck">
                Σύμβολα ατόμων <span class="checkBox"></span>
              </div>
              <div id="hydrogensCheck" class="checkBoxContainer selectedCheck">
                Υδρογόνα <span style="color:#666">C</span>-H<span class="checkBox"></span>
              </div>
              <div id="dropMenu" style="margin-top: 2px"></div>
              <div id="rotateCheck" class="checkBoxContainer unselectedCheck">
                Περιστροφή <span class="checkBox"></span>
              </div>
            </div>
            <div id="save3DBtn" class="saveImgBtn" onclick="fSaveJmolPng()" data-tooltip="Αποθήκευση εικόνας 3D">
              <img src="imgs/image-svgrepo-Industrial-Sharp.svg" />
            </div>
          </div>
        </div>

        <!-- right column -->
        <div id="analysisCol" class="VFlex" style="margin-left: 10px; justify-content: space-between">
          <div>
            <div id="nameAnalysisContainer">
              <div id="ruleTheory"></div>
              <div id="nameAnalysis"></div>
            </div>
            <div id="nameAnalysisExplain"></div>
            <div id="ruleTheoryContainer"></div>
          </div>
        </div>

        <!-- debug -->
        <!-- <div id="debug" style="max-height: 600px; overflow: auto;"></div> -->
      </div>
    </div>

    <!-- <div id="creditsLib"></div> -->
    <div id="creditsUs"></div>
  </div>

    window.JSApplet = window.JSApplet || {};
  </script>

  <script>
    function fToggleMenu() {
      var drawer = document.getElementById("menuDrawer");
      if (drawer.classList.contains("menu-open")) {
        drawer.classList.remove("menu-open");
        drawer.classList.add("menu-closed");
      } else {
        drawer.classList.remove("menu-closed");
        drawer.classList.add("menu-open");
      }
    }

    function fDismissRotatePrompt() {
      var el = document.getElementById("rotatePrompt");
      if (el) el.style.display = "none";
    }
  </script>
</body>
